apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gghstats.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gghstats.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gghstats.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gghstats
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort | default 8080 }}
              name: http
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: GGHSTATS_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default .Values.githubToken.secretName .Values.githubToken.existingSecret }}
                  key: {{ .Values.githubToken.secretKey }}
            - name: GGHSTATS_HOST
              value: {{ .Values.env.host | quote }}
            - name: GGHSTATS_PORT
              value: {{ .Values.env.port | quote }}
            - name: GGHSTATS_DB
              value: {{ .Values.env.dbPath | quote }}
            - name: TMPDIR
              value: /tmp
            - name: GGHSTATS_FILTER
              value: {{ .Values.env.filter | quote }}
            - name: GGHSTATS_INCLUDE_PRIVATE
              value: {{ .Values.env.includePrivate | quote }}
            - name: GGHSTATS_SYNC_INTERVAL
              value: {{ .Values.env.syncInterval | quote }}
            {{- if ne (.Values.env.syncOnStartup | default "") "" }}
            - name: GGHSTATS_SYNC_ON_STARTUP
              value: {{ .Values.env.syncOnStartup | quote }}
            {{- end }}
            - name: GGHSTATS_DEFAULT_LOCALE
              value: {{ .Values.env.defaultLocale | quote }}
            - name: GGHSTATS_ENABLED_LOCALES
              value: {{ .Values.env.enabledLocales | quote }}
            {{- if ne (.Values.env.badgePublic | default "") "" }}
            - name: GGHSTATS_BADGE_PUBLIC
              value: {{ .Values.env.badgePublic | quote }}
            {{- end }}
            {{- if ne (.Values.env.publicUrl | default "") "" }}
            - name: GGHSTATS_PUBLIC_URL
              value: {{ .Values.env.publicUrl | quote }}
            {{- end }}
            {{- if .Values.env.apiToken }}
            - name: GGHSTATS_API_TOKEN
              value: {{ .Values.env.apiToken | quote }}
            {{- end }}
            {{- if ne (.Values.env.metrics | default "") "" }}
            - name: GGHSTATS_METRICS
              value: {{ .Values.env.metrics | quote }}
            {{- end }}
            {{- if ne (.Values.env.metricsPerRepo | default "") "" }}
            - name: GGHSTATS_METRICS_PER_REPO
              value: {{ .Values.env.metricsPerRepo | quote }}
            {{- end }}
            {{- if ne (.Values.env.rateLimitEnabled | default "") "" }}
            - name: GGHSTATS_RATE_LIMIT_ENABLED
              value: {{ .Values.env.rateLimitEnabled | quote }}
            {{- end }}
            {{- if ne (.Values.env.rateLimitRequests | default "") "" }}
            - name: GGHSTATS_RATE_LIMIT_REQUESTS
              value: {{ .Values.env.rateLimitRequests | quote }}
            {{- end }}
            {{- if ne (.Values.env.rateLimitPeriod | default "") "" }}
            - name: GGHSTATS_RATE_LIMIT_PERIOD
              value: {{ .Values.env.rateLimitPeriod | quote }}
            {{- end }}
            {{- if ne (.Values.env.rateLimitBurst | default "") "" }}
            - name: GGHSTATS_RATE_LIMIT_BURST
              value: {{ .Values.env.rateLimitBurst | quote }}
            {{- end }}
            {{- if ne (.Values.env.trustedProxies | default "") "" }}
            - name: GGHSTATS_TRUSTED_PROXIES
              value: {{ .Values.env.trustedProxies | quote }}
            {{- end }}
            {{- if ne (.Values.env.logLevel | default "") "" }}
            - name: GGHSTATS_LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            {{- end }}
            {{- if .Values.env.customCss }}
            - name: GGHSTATS_CUSTOM_CSS
              value: {{ .Values.env.customCss | quote }}
            {{- end }}
            {{- if ne (.Values.env.headHTML | default "") "" }}
            - name: GGHSTATS_HEAD_HTML
              value: {{ .Values.env.headHTML | quote }}
            {{- end }}
            {{- if ne (.Values.env.reverseProxyRules | default "") "" }}
            - name: GGHSTATS_REVERSE_PROXY_RULES
              value: {{ .Values.env.reverseProxyRules | quote }}
            {{- end }}
            {{- if .Values.env.enableCollector }}
            - name: GGHSTATS_ENABLE_COLLECTOR
              value: {{ .Values.env.enableCollector | quote }}
            {{- end }}
            {{- if .Values.env.enableUpdateCheck }}
            - name: GGHSTATS_ENABLE_UPDATE_CHECK
              value: {{ .Values.env.enableUpdateCheck | quote }}
            {{- end }}
            {{- if ne (.Values.env.syncWorkers | default "") "" }}
            - name: GGHSTATS_SYNC_WORKERS
              value: {{ .Values.env.syncWorkers | quote }}
            {{- end }}
            {{- if ne (.Values.env.demo | default "") "" }}
            - name: GGHSTATS_DEMO
              value: {{ .Values.env.demo | quote }}
            {{- end }}
            {{- if .Values.alerting.enabled }}
            - name: GGHSTATS_ALERTS_ENABLED
              value: "true"
            - name: GGHSTATS_ALERT_SINKS
              value: {{ required "alerting.sinks is required when alerting.enabled=true" .Values.alerting.sinks | quote }}
            - name: GGHSTATS_ALERT_RULES
              value: {{ required "alerting.rules is required when alerting.enabled=true" .Values.alerting.rules | quote }}
            {{- end }}
          {{- if .Values.alerting.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.alerting.existingSecret }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gghstats.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
