replicaCount: 1

image:
  repository: ghcr.io/hrodrig/gghstats
  tag: "v0.1.5"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  # Must match env.port (container listen port for Service target and probes).
  port: 8080

env:
  host: "0.0.0.0"
  # Must match service.port.
  port: "8080"
  # SQLite path — must be under the /data volume (only writable mount besides /tmp).
  dbPath: "/data/gghstats.db"
  filter: "*"
  includePrivate: "false"
  syncInterval: "1h"
  apiToken: ""
  # Leave empty for default (Prometheus /metrics enabled). Set to "false" to disable.
  metrics: ""

githubToken:
  existingSecret: ""
  secretName: gghstats-secret
  secretKey: github-token
  value: ""

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# Required shape is enforced by values.schema.json (Helm rejects missing or incomplete resources).
# Baseline for scheduling (requests) and burst cap (limits). Tune for your traffic and GitHub sync load.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Must match the non-root user in the upstream image (see gghstats Dockerfile: USER gghstats, uid/gid 1000).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
