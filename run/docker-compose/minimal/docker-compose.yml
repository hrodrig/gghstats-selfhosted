# json-file log rotation (avoids unbounded container log growth on disk).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gghstats:
    image: ghcr.io/hrodrig/gghstats:${GGHSTATS_VERSION:-v0.10.1}
    container_name: gghstats
    restart: unless-stopped
    environment:
      - GGHSTATS_GITHUB_TOKEN=${GGHSTATS_GITHUB_TOKEN:-}
      - GGHSTATS_DEMO=${GGHSTATS_DEMO:-}
      - GGHSTATS_HOST=0.0.0.0
      - GGHSTATS_PORT=${GGHSTATS_PORT:-8080}
      - GGHSTATS_DB=/data/gghstats.db
      - GGHSTATS_FILTER=${GGHSTATS_FILTER:-*}
      - GGHSTATS_SYNC_INTERVAL=${GGHSTATS_SYNC_INTERVAL:-1h}
      - GGHSTATS_INCLUDE_PRIVATE=${GGHSTATS_INCLUDE_PRIVATE:-false}
      - GGHSTATS_API_TOKEN=${GGHSTATS_API_TOKEN:-}
      - GGHSTATS_LOG_LEVEL=${GGHSTATS_LOG_LEVEL:-info}
      - GGHSTATS_CUSTOM_CSS=${GGHSTATS_CUSTOM_CSS:-}
      - GGHSTATS_METRICS=${GGHSTATS_METRICS:-}
      - GGHSTATS_METRICS_PER_REPO=${GGHSTATS_METRICS_PER_REPO:-false}
      - GGHSTATS_RATE_LIMIT_ENABLED=${GGHSTATS_RATE_LIMIT_ENABLED:-}
      - GGHSTATS_RATE_LIMIT_REQUESTS=${GGHSTATS_RATE_LIMIT_REQUESTS:-}
      - GGHSTATS_RATE_LIMIT_PERIOD=${GGHSTATS_RATE_LIMIT_PERIOD:-}
      - GGHSTATS_RATE_LIMIT_BURST=${GGHSTATS_RATE_LIMIT_BURST:-}
      - GGHSTATS_WHITELIST=${GGHSTATS_WHITELIST:-}
      - GGHSTATS_WHITELIST_PATHS=${GGHSTATS_WHITELIST_PATHS:-}
      - GGHSTATS_SYNC_ON_STARTUP=${GGHSTATS_SYNC_ON_STARTUP:-true}
      - GGHSTATS_DEFAULT_LOCALE=${GGHSTATS_DEFAULT_LOCALE:-en}
      - GGHSTATS_ENABLED_LOCALES=${GGHSTATS_ENABLED_LOCALES:-en,es,de,fr,pt-br}
      - GGHSTATS_BADGE_PUBLIC=${GGHSTATS_BADGE_PUBLIC:-}
      - GGHSTATS_PUBLIC_URL=${GGHSTATS_PUBLIC_URL:-}
      - GGHSTATS_HEAD_HTML=${GGHSTATS_HEAD_HTML:-}
      - GGHSTATS_REVERSE_PROXY_RULES=${GGHSTATS_REVERSE_PROXY_RULES:-}
      - GGHSTATS_SYNC_WORKERS=${GGHSTATS_SYNC_WORKERS:-4}
      - GGHSTATS_ENABLE_COLLECTOR=${GGHSTATS_ENABLE_COLLECTOR:-}
      - GGHSTATS_ENABLE_UPDATE_CHECK=${GGHSTATS_ENABLE_UPDATE_CHECK:-}
      - GGHSTATS_ALERTS_ENABLED=${GGHSTATS_ALERTS_ENABLED:-false}
      - GGHSTATS_ALERT_SINKS=${GGHSTATS_ALERT_SINKS:-}
      - GGHSTATS_ALERT_RULES=${GGHSTATS_ALERT_RULES:-}
      - GGHSTATS_SLACK_WEBHOOK_URL=${GGHSTATS_SLACK_WEBHOOK_URL:-}
      - GGHSTATS_DISCORD_WEBHOOK_URL=${GGHSTATS_DISCORD_WEBHOOK_URL:-}
      - GGHSTATS_TEAMS_WEBHOOK_URL=${GGHSTATS_TEAMS_WEBHOOK_URL:-}
      - GGHSTATS_WEBHOOK_URL=${GGHSTATS_WEBHOOK_URL:-}
      - GGHSTATS_WEBHOOK_TOKEN=${GGHSTATS_WEBHOOK_TOKEN:-}
      - GGHSTATS_N8N_WEBHOOK_URL=${GGHSTATS_N8N_WEBHOOK_URL:-}
      - GGHSTATS_N8N_TOKEN=${GGHSTATS_N8N_TOKEN:-}
      - GGHSTATS_LOKI_URL=${GGHSTATS_LOKI_URL:-}
      - GGHSTATS_LOKI_TENANT=${GGHSTATS_LOKI_TENANT:-}
      - GGHSTATS_SMTP_HOST=${GGHSTATS_SMTP_HOST:-}
      - GGHSTATS_SMTP_PORT=${GGHSTATS_SMTP_PORT:-587}
      - GGHSTATS_SMTP_USER=${GGHSTATS_SMTP_USER:-}
      - GGHSTATS_SMTP_PASSWORD=${GGHSTATS_SMTP_PASSWORD:-}
      - GGHSTATS_SMTP_FROM=${GGHSTATS_SMTP_FROM:-}
      - GGHSTATS_SMTP_TO=${GGHSTATS_SMTP_TO:-}
    ports:
      - "${GGHSTATS_PORT:-8080}:${GGHSTATS_PORT:-8080}"
    volumes:
      # Host path for SQLite (prefer absolute, e.g. /var/lib/gghstats). Default: repo data/ via path relative to this file.
      - ${GGHSTATS_HOST_DATA:-../../../data}:/data
    logging: *default-logging
