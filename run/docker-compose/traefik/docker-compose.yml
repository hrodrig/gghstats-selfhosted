# Production-oriented stack: Traefik (TLS + HTTP→HTTPS) + gghstats (no host ports).
#
# Prerequisites:
#   - DNS A/AAAA for GGHSTATS_HOSTNAME → this host's public IP
#   - Ports 80 and 443 reachable from the internet (80 for redirect + ACME HTTP-01)
#
# Usage (from repository root):
#   export GGHSTATS_HOST_DATA=/path/on/host
#   mkdir -p "$GGHSTATS_HOST_DATA"
#   cp run/common/.env.example "${GGHSTATS_HOST_DATA}/.env"   # edit; set GGHSTATS_HOST_DATA inside the file
#   docker compose --env-file "${GGHSTATS_HOST_DATA}/.env" -f run/docker-compose/traefik/docker-compose.yml up -d
#
# Local dev without Traefik: use run/docker-compose/minimal/docker-compose.yml instead.
#
# Bind mount: set GGHSTATS_HOST_DATA to an absolute host path (recommended). GGS_UID/GGS_GID must own that directory (see id -u / id -g).
# Typical Linux user gghstats is 1001:1001 when UID 1000 is taken by the admin account.
#
# Traefik needs a recent image for Docker Engine 28+ / 29+ (minimum API 1.40+); see traefik:v3.6.1+.
# Prometheus metrics: run/docker-compose/observability/observability/prometheus.yml scrapes http://traefik:8080/metrics (same Docker network).
#
# Log rotation (json-file driver): caps disk use per container; tune max-size/max-file if access logs are heavy.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  edge:
    name: gghstats_edge
    driver: bridge

volumes:
  traefik_letsencrypt:

services:
  traefik:
    image: traefik:v3.6.12
    restart: always
    security_opt:
      - no-new-privileges:true
    command:
      - --log.level=INFO
      # Opt-in: anonymous usage stats (version, hashed static config). Disable with false if you prefer no telemetry.
      - --global.sendAnonymousUsage=true
      - --accesslog=true
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=gghstats_edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Prometheus metrics at http://traefik:8080/metrics (internal only; not published on the host).
      - --metrics.prometheus=true
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --entrypoints.traefik.address=:8080
      # Redirect all HTTP to HTTPS (ACME HTTP-01 paths are handled before redirect).
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - edge
    logging: *default-logging

  gghstats:
    image: ghcr.io/hrodrig/gghstats:${GGHSTATS_VERSION:-v0.1.2}
    restart: always
    user: "${GGS_UID:?set GGS_UID in .env to id -u}:${GGS_GID:?set GGS_GID in .env to id -g}"
    security_opt:
      - no-new-privileges:true
    environment:
      GGHSTATS_GITHUB_TOKEN: ${GGHSTATS_GITHUB_TOKEN:?set GGHSTATS_GITHUB_TOKEN}
      GGHSTATS_HOST: "0.0.0.0"
      GGHSTATS_PORT: "8080"
      GGHSTATS_DB: /data/gghstats.db
      GGHSTATS_FILTER: ${GGHSTATS_FILTER:-*}
      GGHSTATS_SYNC_INTERVAL: ${GGHSTATS_SYNC_INTERVAL:-1h}
      GGHSTATS_INCLUDE_PRIVATE: ${GGHSTATS_INCLUDE_PRIVATE:-false}
      GGHSTATS_API_TOKEN: ${GGHSTATS_API_TOKEN:-}
      GGHSTATS_LOG_LEVEL: ${GGHSTATS_LOG_LEVEL:-info}
    volumes:
      - ${GGHSTATS_HOST_DATA:-../../../data}:/data
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=gghstats_edge
      # Rate limit per client IP (token bucket); reduces noisy scanners before they hit the app.
      - traefik.http.middlewares.gghstats-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.gghstats-ratelimit.ratelimit.period=1s
      - traefik.http.middlewares.gghstats-ratelimit.ratelimit.burst=50
      - traefik.http.middlewares.gghstats-hdr.headers.frameDeny=true
      - traefik.http.middlewares.gghstats-hdr.headers.browserXssFilter=true
      - traefik.http.middlewares.gghstats-hdr.headers.contentTypeNosniff=true
      - traefik.http.middlewares.gghstats-hdr.headers.stsSeconds=31536000
      - traefik.http.middlewares.gghstats-hdr.headers.stsIncludeSubdomains=false
      - traefik.http.routers.gghstats.rule=Host(`${GGHSTATS_HOSTNAME:?set GGHSTATS_HOSTNAME FQDN}`)
      - traefik.http.routers.gghstats.entrypoints=websecure
      - traefik.http.routers.gghstats.tls=true
      - traefik.http.routers.gghstats.tls.certresolver=le
      - traefik.http.routers.gghstats.middlewares=gghstats-ratelimit,gghstats-hdr
      - traefik.http.services.gghstats.loadbalancer.server.port=8080
    logging: *default-logging
