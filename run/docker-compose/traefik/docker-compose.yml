# Production-oriented stack: Traefik (TLS + HTTP→HTTPS) + gghstats (no host ports).
#
# Prerequisites:
#   - DNS A/AAAA for GGHSTATS_HOSTNAME → this host's public IP
#   - Ports 80 and 443 reachable from the internet (80 for redirect + ACME HTTP-01)
#
# Usage (from repository root):
#   export GGHSTATS_HOST_DATA=/path/on/host
#   mkdir -p "$GGHSTATS_HOST_DATA"
#   cp run/common/.env.example "${GGHSTATS_HOST_DATA}/.env"   # edit; set GGHSTATS_HOST_DATA inside the file
#   docker compose --env-file "${GGHSTATS_HOST_DATA}/.env" \
#     -f run/docker-compose/traefik/docker-compose.yml up -d
#   Project name gghstats-edge → containers gghstats-edge-traefik-1, gghstats-edge-gghstats-1
#   (same pattern as observability gghstats-obs-grafana-1). Prometheus scrapes service names gghstats / traefik on gghstats_edge.
#
# Local dev without Traefik: use run/docker-compose/minimal/docker-compose.yml instead.
#
# Bind mount: set GGHSTATS_HOST_DATA to an absolute host path (recommended). GGS_UID/GGS_GID must own that directory (see id -u / id -g).
# Typical Linux user gghstats is 1001:1001 when UID 1000 is taken by the admin account.
#
# Traefik needs a recent image for Docker Engine 28+ / 29+ (minimum API 1.40+); see traefik:v3.6.1+.
# Pin >= v3.6.14 for security advisories (e.g. ForwardAuth header sanitization); v3.6.17 is current 3.6.x patch.
# Prometheus metrics: run/docker-compose/observability/observability/prometheus.yml scrapes http://traefik:8080/metrics (same Docker network).
#
# Log rotation (json-file driver): caps disk use per container; tune max-size/max-file if access logs are heavy.

name: gghstats-edge

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  edge:
    name: gghstats_edge
    driver: bridge

volumes:
  traefik_letsencrypt:

services:
  traefik:
    image: traefik:v3.6.17
    restart: always
    security_opt:
      - no-new-privileges:true
    command:
      - --log.level=INFO
      # Opt-in: anonymous usage stats (version, hashed static config). Disable with false if you prefer no telemetry.
      - --global.sendAnonymousUsage=true
      - --accesslog=true
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=gghstats_edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Prometheus metrics at http://traefik:8080/metrics (internal only; not published on the host).
      - --metrics.prometheus=true
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --entrypoints.traefik.address=:8080
      # Redirect all HTTP to HTTPS (ACME HTTP-01 paths are handled before redirect).
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - edge
    logging: *default-logging

  gghstats:
    image: ghcr.io/hrodrig/gghstats:${GGHSTATS_VERSION:-v0.7.10}
    restart: always
    user: "${GGS_UID:?set GGS_UID in .env to id -u}:${GGS_GID:?set GGS_GID in .env to id -g}"
    security_opt:
      - no-new-privileges:true
    environment:
      GGHSTATS_GITHUB_TOKEN: ${GGHSTATS_GITHUB_TOKEN:?set GGHSTATS_GITHUB_TOKEN}
      GGHSTATS_HOST: "0.0.0.0"
      GGHSTATS_PORT: "8080"
      GGHSTATS_DB: /data/gghstats.db
      GGHSTATS_FILTER: ${GGHSTATS_FILTER:-*}
      GGHSTATS_SYNC_INTERVAL: ${GGHSTATS_SYNC_INTERVAL:-1h}
      GGHSTATS_INCLUDE_PRIVATE: ${GGHSTATS_INCLUDE_PRIVATE:-false}
      GGHSTATS_API_TOKEN: ${GGHSTATS_API_TOKEN:-}
      GGHSTATS_LOG_LEVEL: ${GGHSTATS_LOG_LEVEL:-info}
      GGHSTATS_CUSTOM_CSS: ${GGHSTATS_CUSTOM_CSS:-}
      GGHSTATS_METRICS_PER_REPO: ${GGHSTATS_METRICS_PER_REPO:-false}
      GGHSTATS_RATE_LIMIT_ENABLED: ${GGHSTATS_RATE_LIMIT_ENABLED:-}
      GGHSTATS_RATE_LIMIT_REQUESTS: ${GGHSTATS_RATE_LIMIT_REQUESTS:-}
      GGHSTATS_RATE_LIMIT_PERIOD: ${GGHSTATS_RATE_LIMIT_PERIOD:-}
      GGHSTATS_RATE_LIMIT_BURST: ${GGHSTATS_RATE_LIMIT_BURST:-}
      GGHSTATS_WHITELIST: ${GGHSTATS_WHITELIST:-}
      GGHSTATS_WHITELIST_PATHS: ${GGHSTATS_WHITELIST_PATHS:-}
      GGHSTATS_SYNC_ON_STARTUP: ${GGHSTATS_SYNC_ON_STARTUP:-true}
      GGHSTATS_DEFAULT_LOCALE: ${GGHSTATS_DEFAULT_LOCALE:-en}
      GGHSTATS_ENABLED_LOCALES: ${GGHSTATS_ENABLED_LOCALES:-en,es,de,fr,pt-br}
      GGHSTATS_BADGE_PUBLIC: ${GGHSTATS_BADGE_PUBLIC:-}
      GGHSTATS_PUBLIC_URL: ${GGHSTATS_PUBLIC_URL:-}
      GGHSTATS_HEAD_HTML: ${GGHSTATS_HEAD_HTML:-}
      GGHSTATS_REVERSE_PROXY_RULES: ${GGHSTATS_REVERSE_PROXY_RULES:-}
    volumes:
      - ${GGHSTATS_HOST_DATA:-../../../data}:/data
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=gghstats_edge
      # Rate limit per client IP (token bucket). gghstats >= 0.7.5 has built-in per-IP rate limiting;
      # keep this Traefik middleware as defence-in-depth against noisy scanners at the edge.
      # If you tune the in-app limit, you can relax or remove this layer.
      - traefik.http.middlewares.gghstats-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.gghstats-ratelimit.ratelimit.period=1s
      - traefik.http.middlewares.gghstats-ratelimit.ratelimit.burst=50
      - traefik.http.middlewares.gghstats-hdr.headers.frameDeny=true
      - traefik.http.middlewares.gghstats-hdr.headers.browserXssFilter=true
      - traefik.http.middlewares.gghstats-hdr.headers.contentTypeNosniff=true
      - traefik.http.middlewares.gghstats-hdr.headers.stsSeconds=31536000
      - traefik.http.middlewares.gghstats-hdr.headers.stsIncludeSubdomains=false
      # Do not expose /metrics on the public hostname. Prometheus (observability stack) scrapes
      # http://gghstats:8080/metrics on gghstats_edge — that path never goes through Traefik.
      # README badge embeds: separate router without edge rate limit (GitHub/camo fetches SVG).
      - traefik.http.routers.gghstats-badges.rule=Host(`${GGHSTATS_HOSTNAME:?set GGHSTATS_HOSTNAME FQDN}`) && PathPrefix(`/api/v1/badge`)
      - traefik.http.routers.gghstats-badges.priority=100
      - traefik.http.routers.gghstats-badges.entrypoints=websecure
      - traefik.http.routers.gghstats-badges.tls=true
      - traefik.http.routers.gghstats-badges.tls.certresolver=le
      - traefik.http.routers.gghstats-badges.middlewares=gghstats-hdr
      - traefik.http.routers.gghstats-badges.service=gghstats
      - traefik.http.routers.gghstats.rule=Host(`${GGHSTATS_HOSTNAME:?set GGHSTATS_HOSTNAME FQDN}`) && !PathPrefix(`/metrics`) && !PathPrefix(`/api/v1/badge`)
      - traefik.http.routers.gghstats.priority=1
      - traefik.http.routers.gghstats.entrypoints=websecure
      - traefik.http.routers.gghstats.tls=true
      - traefik.http.routers.gghstats.tls.certresolver=le
      - traefik.http.routers.gghstats.middlewares=gghstats-ratelimit,gghstats-hdr
      - traefik.http.services.gghstats.loadbalancer.server.port=8080
    logging: *default-logging
